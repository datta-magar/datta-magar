<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Location - Dubai Airport</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            max-width: 500px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .location {
            font-size: 1.5rem;
            margin: 20px 0;
        }

        .emoji {
            font-size: 70px;
        }

        .status {
            color: #90ee90;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .time {
            margin-top: 20px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji">✈️🌍</div>

        <h1>Current Location</h1>

        <div class="location">
            📍 Dubai International Airport (DXB)
        </div>

        <p class="status">
            Dattaboii & Vedamie are currently at Dubai Airport,
            waiting for their connecting flight to Miami. 🛫
        </p>

        <div class="time" id="dubaiTime"></div>
    </div>

    <script>
        function updateDubaiTime() {
            const options = {
                timeZone: 'Asia/Dubai',
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };

            const dubaiTime = new Date().toLocaleString('en-US', options);
            document.getElementById("dubaiTime").innerHTML =
                `🕒 Local Time in Dubai:<br>${dubaiTime}`;
        }

        updateDubaiTime();
        setInterval(updateDubaiTime, 1000);
    </script>

</body>
</html>
